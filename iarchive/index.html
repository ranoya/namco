    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        border: 0;
        width: 100%;
        height: 100dvh;
        overflow: hidden;
        background-color: black;
      }

      #warp {
        width: 100%;
        height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      iframe {
        aspect-ratio: 512/342;
      }
    </style>
  </head>

  <body>
    <div id="wrap">
      <iframe
        id="conteudo"
        frameborder="0"
        width="512"
        height="342"
        webkitallowfullscreen="true"
        mozallowfullscreen="true"
        allowfullscreen
      ></iframe>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const url = urlParams.get("rom");
      const conteudo = document.getElementById("conteudo");
      conteudo.src = "https://archive.org/embed/" + url;

      setTimeout(function () {
        document.getElementById("conteudo").style.width = "100% !important";
      }, 10000);
    </script>
  </body>
